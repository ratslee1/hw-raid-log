name: Deploy to Azure App Service

on:
  push:
    branches: [main]

env:
  ACR_NAME: raidlogacr
  IMAGE_NAME: raid-log
  APP_NAME: raid-log-app
  RESOURCE_GROUP: sangheun-test-personal-krc-rg001-629

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Docker image
        run: |
          docker build \
            --build-arg VITE_AZURE_OPENAI_KEY=${{ secrets.AZURE_OPENAI_KEY }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --container-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --container-registry-url https://${{ env.ACR_NAME }}.azurecr.io \
            --container-registry-user ${{ env.ACR_NAME }} \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"
          az webapp restart --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}
          echo "✅ 배포 완료: https://${{ env.APP_NAME }}.azurewebsites.net"
