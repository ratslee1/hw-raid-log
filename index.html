const cx = (...a) => a.filter(Boolean).join(' ');

const Chip = ({ className, children }) => (
  <span className={cx('inline-flex items-center gap-1 text-[11px] font-medium px-2 py-0.5 rounded-md ring-1', className)}>{children}</span>
);

const TypeBadge = ({ type, size = 'md' }) => {
  const meta = TYPE_META[type];
  const tone = TYPE_TONE[meta.tone];
  const Icon = meta.icon;
  if (size === 'sm') {
    return (
      <span className={cx('inline-flex items-center gap-1 text-[11px] font-medium px-1.5 py-0.5 rounded', tone.bg, tone.text)}>
        <Icon className="w-3 h-3" />{meta.ko}
      </span>
    );
  }
  return (
    <span className={cx('inline-flex items-center gap-1.5 text-xs font-semibold px-2 py-1 rounded-md', tone.bg, tone.text)}>
      <Icon className="w-3.5 h-3.5" />{meta.ko}
    </span>
  );
};

const StatusBadge = ({ status }) => (
  <Chip className={STATUS_STYLES[status] || 'bg-stone-100 text-stone-700 ring-stone-200'}>{status}</Chip>
);

const SeverityBadge = ({ severity }) => (
  <span className={cx('inline-flex items-center text-[11px] font-bold px-2 py-0.5 rounded tracking-wide uppercase', SEVERITY_STYLES[severity])}>
    {severity}
  </span>
);

const dueChip = (due) => {
  const diff = dayDiff(due);
  if (diff < 0) return { cls: 'text-red-700 bg-red-50 ring-red-200', label: `${Math.abs(diff)}일 경과` };
  if (diff <= 3) return { cls: 'text-orange-700 bg-orange-50 ring-orange-200', label: `D-${diff}` };
  if (diff <= 7) return { cls: 'text-amber-800 bg-amber-50 ring-amber-200', label: `D-${diff}` };
  return { cls: 'text-stone-600 bg-stone-50 ring-stone-200', label: `D-${diff}` };
};

const Dashboard = ({ items, setView, setFilters }) => {
  const TERMINAL = ['Closed', 'Resolved', 'Validated', 'Invalidated'];
  const kpis = Object.keys(TYPE_META).map(t => {
    const ofType = items.filter(i => i.type === t);
    const open = ofType.filter(i => !TERMINAL.includes(i.status));
    const critical = open.filter(i => i.severity === 'Critical' || i.severity === 'High').length;
    return { type: t, total: ofType.length, open: open.length, critical };
  });

  const matrix = AREAS.map(area => ({
    area,
    counts: Object.keys(TYPE_META).reduce((acc, t) => {
      acc[t] = items.filter(i => i.area === area.id && i.type === t && !TERMINAL.includes(i.status)).length;
      return acc;
    }, {})
  }));

  const sevDist = SEVERITIES.map(s => ({
    sev: s,
    count: items.filter(i => i.severity === s && !TERMINAL.includes(i.status)).length,
  }));
  const maxSev = Math.max(...sevDist.map(s => s.count), 1);

  const attention = items
    .filter(i => !TERMINAL.includes(i.status))
    .sort((a, b) => {
      const da = dayDiff(a.dueDate);
      const db = dayDiff(b.dueDate);
      if (da !== db) return da - db;
      return SEVERITY_WEIGHT[b.severity] - SEVERITY_WEIGHT[a.severity];
    })
    .slice(0, 6);

  const activity = [
    ...items.flatMap(i => (i.comments || []).map(c => ({ type: 'comment', item: i, ...c }))),
    ...items.map(i => ({ type: 'create', item: i, date: i.createdAt, author: i.owner, text: `항목 생성` })),
  ].sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 6);

  return (
    <div className="max-w-[1400px] mx-auto px-6 py-8">
      <div className="mb-8">
        <div className="text-[11px] font-mono uppercase tracking-widest text-stone-500 mb-1">Project RAID overview</div>
        <h1 className="text-3xl font-serif font-semibold text-stone-900">프로젝트 RAID 현황</h1>
        <p className="text-sm text-stone-600 mt-1">5개 영역 · {items.length}개 항목 추적 중</p>
      </div>

      <div className="grid grid-cols-4 gap-3 mb-6">
        {kpis.map(({ type, total, open, critical }) => {
          const meta = TYPE_META[type];
          const tone = TYPE_TONE[meta.tone];
          const Icon = meta.icon;
          return (
            <div key={type} className="relative bg-white border border-stone-200 rounded-lg p-4 overflow-hidden group hover:border-stone-300 transition">
              <div className={cx('absolute top-0 left-0 w-1 h-full', tone.solid)} />
              <div className="flex items-start justify-between mb-3">
                <div>
                  <div className="text-[11px] font-mono uppercase tracking-wider text-stone-500">{type}</div>
                  <div className="text-xs text-stone-700 font-medium">{meta.ko}</div>
                </div>
                <div className={cx('w-7 h-7 rounded-md flex items-center justify-center', tone.bg)}>
                  <Icon className={cx('w-4 h-4', tone.text)} />
                </div>
              </div>
              <div className="flex items-baseline gap-2">
                <div className="text-3xl font-serif font-semibold text-stone-900">{open}</div>
                <div className="text-xs text-stone-500">/ {total} 전체</div>
              </div>
              {critical > 0 && (
                <div className="mt-2 text-[11px] text-red-700 font-medium flex items-center gap-1">
                  <Circle className="w-2 h-2" /> {critical}건 Critical/High
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="grid grid-cols-3 gap-4 mb-6">
        <div className="col-span-2 bg-white border border-stone-200 rounded-lg p-5">
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="font-serif font-semibold text-stone-900">영역 × Type Matrix</h2>
            <span className="text-[11px] text-stone-500 font-mono">OPEN items only</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-stone-200">
                  <th className="text-left text-[11px] font-mono uppercase tracking-wider text-stone-500 pb-2 pr-4">영역</th>
                  {Object.keys(TYPE_META).map(t => (
                    <th key={t} className="text-center text-[11px] font-mono uppercase tracking-wider text-stone-500 pb-2 w-24">{t.slice(0,1)}</th>
                  ))}
                  <th className="text-right text-[11px] font-mono uppercase tracking-wider text-stone-500 pb-2 pl-4 w-16">합계</th>
                </tr>
              </thead>
              <tbody>
                {matrix.map(({ area, counts }) => {
                  const total = Object.values(counts).reduce((a, b) => a + b, 0);
                  return (
                    <tr key={area.id} className="border-b border-stone-100 hover:bg-stone-50 transition cursor-pointer"
                      onClick={() => { setFilters({ area: area.id, type: 'all', status: 'all', severity: 'all', search: '' }); setView('log'); }}>
                      <td className="py-3 pr-4">
                        <div className="font-medium text-stone-900 text-sm">{area.name}</div>
                        <div className="text-[11px] text-stone-500 font-mono">{area.id}</div>
                      </td>
                      {Object.keys(TYPE_META).map(t => {
                        const c = counts[t];
                        const tone = TYPE_TONE[TYPE_META[t].tone];
                        if (c === 0) return <td key={t} className="text-center py-3 text-stone-300">—</td>;
                        const intensity = c >= 3 ? 'opacity-100' : c === 2 ? 'opacity-75' : 'opacity-55';
                        return (
                          <td key={t} className="text-center py-3">
                            <span className={cx('inline-flex items-center justify-center w-8 h-8 rounded-md text-sm font-semibold text-white', tone.solid, intensity)}>
                              {c}
                            </span>
                          </td>
                        );
                      })}
                      <td className="text-right pl-4 py-3 font-serif font-semibold text-stone-900">{total}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="mt-3 text-[11px] text-stone-500">
            행 클릭 시 해당 영역으로 필터링된 RAID Log로 이동합니다.
          </div>
        </div>

        <div className="bg-white border border-stone-200 rounded-lg p-5">
          <h2 className="font-serif font-semibold text-stone-900 mb-4">Severity 분포</h2>
          <div className="space-y-3">
            {sevDist.map(({ sev, count }) => (
              <div key={sev}>
                <div className="flex items-baseline justify-between mb-1">
                  <SeverityBadge severity={sev} />
                  <span className="font-mono text-sm text-stone-700">{count}</span>
                </div>
                <div className="h-2 bg-stone-100 rounded-full overflow-hidden">
                  <div
                    className={cx('h-full', SEVERITY_STYLES[sev].split(' ')[0])}
                    style={{ width: `${(count / maxSev) * 100}%` }}
                  />
                </div>
              </div>
            ))}
          </div>
          <div className="border-t border-stone-100 mt-5 pt-4">
            <div className="text-[11px] font-mono uppercase tracking-wider text-stone-500 mb-2">Overall Health</div>
            <div className="text-2xl font-serif font-semibold text-stone-900">
              {items.filter(i => !TERMINAL.includes(i.status)).length}
              <span className="text-sm font-sans font-normal text-stone-500 ml-1">open</span>
            </div>
            <div className="text-xs text-stone-600 mt-1">
              {items.filter(i => TERMINAL.includes(i.status)).length}건 종결됨
            </div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-5 gap-4">
        <div className="col-span-3 bg-white border border-stone-200 rounded-lg p-5">
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="font-serif font-semibold text-stone-900">주목 필요 항목</h2>
            <span className="text-[11px] text-stone-500 font-mono">due + severity 기준 상위 {attention.length}건</span>
          </div>
          <div className="space-y-2">
            {attention.map(item => {
              const due = dueChip(item.dueDate);
              return (
                <div key={item.id} className="flex items-center gap-3 p-2.5 rounded-md hover:bg-stone-50 transition">
                  <TypeBadge type={item.type} size="sm" />
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-stone-900 truncate">{item.title}</div>
                    <div className="text-[11px] text-stone-500 font-mono truncate">
                      {item.id} · {AREA_MAP[item.area]?.name} · {item.owner}
                    </div>
                  </div>
                  <SeverityBadge severity={item.severity} />
                  <Chip className={due.cls}>{due.label}</Chip>
                </div>
              );
            })}
          </div>
        </div>

        <div className="col-span-2 bg-white border border-stone-200 rounded-lg p-5">
          <h2 className="font-serif font-semibold text-stone-900 mb-4">최근 활동</h2>
          <div className="space-y-3">
            {activity.map((a, i) => (
              <div key={i} className="flex gap-3 text-sm">
                <div className="w-1.5 h-1.5 mt-2 rounded-full bg-stone-400 flex-shrink-0" />
                <div className="flex-1 min-w-0">
                  <div className="flex items-baseline gap-2">
                    <span className="font-medium text-stone-900 text-xs">{a.author}</span>
                    <span className="text-[10px] text-stone-500 font-mono">{a.date}</span>
                  </div>
                  <div className="text-xs text-stone-700 truncate">
                    {a.type === 'create' ? (
                      <><span className="font-mono text-stone-500">{a.item.id}</span> 생성</>
                    ) : (
                      <><span className="font-mono text-stone-500">{a.item.id}</span> · {a.text}</>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

            </button>
            <button
              onClick={() => { if (confirm(`${item.id} 삭제 확인?`)) onDelete(); }}
              className="w-7 h-7 flex items-center justify-center rounded hover:bg-red-50 transition" title="삭제"
            >
              <Trash2 className="w-4 h-4 text-red-600" />
            </button>
            <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded hover:bg-stone-100 transition">
              <X className="w-4 h-4 text-stone-600" />
            </button>
          </div>
        </div>

        <div className="px-6 py-5">
          <h1 className="text-xl font-serif font-semibold text-stone-900 leading-snug mb-3">{item.title}</h1>
          <div className="flex items-center gap-2 mb-5">
            <StatusBadge status={item.status} />
            <SeverityBadge severity={item.severity} />
            <Chip className={due.cls}>{due.label}</Chip>
          </div>

          {next.length > 0 && (
            <div className="bg-stone-50 border border-stone-200 rounded-lg p-3 mb-5">
              <div className="text-[11px] font-mono uppercase tracking-wider text-stone-500 mb-2">상태 전환</div>
              <div className="flex items-center gap-2 flex-wrap">
                {next.map(s => (
                  <button
                    key={s}
                    onClick={() => onTransition(item.id, s)}
                    className="flex items-center gap-1.5 bg-white border border-stone-200 hover:border-stone-900 hover:bg-stone-900 hover:text-white px-2.5 py-1.5 rounded-md text-xs font-medium transition"
                  >
                    <ArrowRight className="w-3 h-3" />
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="grid grid-cols-2 gap-x-6 gap-y-3 mb-6 py-4 border-y border-stone-200">
            <Meta label="영역">
              <div className="text-sm font-medium text-stone-900">{area?.name}</div>
              <div className="text-[11px] text-stone-500 font-mono">{area?.id}</div>
            </Meta>
            <Meta label="Owner">
              <div className="text-sm text-stone-900">{item.owner || '—'}</div>
            </Meta>
            <Meta label="Due Date">
              <div className="text-sm text-stone-900 font-mono">{item.dueDate}</div>
            </Meta>
            <Meta label="Created">
              <div className="text-sm text-stone-900 font-mono">{item.createdAt}</div>
            </Meta>
          </div>

          <Section title="설명">
            <p className="text-sm text-stone-700 leading-relaxed whitespace-pre-wrap">{item.description || '—'}</p>
          </Section>

          <Section title={item.type === 'Risk' ? 'Mitigation Plan' : item.type === 'Issue' ? 'Resolution' : 'Action / Validation'}>
            <p className="text-sm text-stone-700 leading-relaxed whitespace-pre-wrap">{item.mitigation || '—'}</p>
          </Section>

          <Section title={`Comments (${item.comments?.length || 0})`}>
            <div className="space-y-3">
              {(item.comments || []).length === 0 && (
                <div className="text-xs text-stone-500 italic">아직 코멘트가 없습니다.</div>
              )}
              {(item.comments || []).map((c, idx) => (
                <div key={idx} className="flex gap-3">
                  <div className="w-7 h-7 rounded-full bg-stone-900 text-white flex items-center justify-center text-[11px] font-medium flex-shrink-0">
                    {c.author.slice(0, 1)}
                  </div>
                  <div className="flex-1 bg-stone-50 rounded-lg px-3 py-2">
                    <div className="flex items-baseline gap-2 mb-0.5">
                      <span className="text-xs font-semibold text-stone-900">{c.author}</span>
                      <span className="text-[10px] text-stone-500 font-mono">{c.date}</span>
                    </div>
                    <div className="text-sm text-stone-700">{c.text}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="mt-4 flex gap-2">
              <input
                type="text"
                value={comment}
                onChange={(e) => setComment(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter' && comment.trim()) {
                    onAddComment(item.id, comment.trim());
                    setComment('');
                  }
                }}
                placeholder="코멘트 추가 후 Enter…"
                className="flex-1 px-3 py-1.5 bg-white border border-stone-200 rounded-md text-xs focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent"
              />
              <button
                disabled={!comment.trim()}
                onClick={() => { onAddComment(item.id, comment.trim()); setComment(''); }}
                className="px-3 py-1.5 bg-stone-900 text-white text-xs font-medium rounded-md disabled:bg-stone-200 disabled:text-stone-400 hover:bg-stone-800 transition"
              >
                등록
              </button>
            </div>
          </Section>
        </div>
      </div>
    </div>
  );
};

/* ==========================================================================
   Create / Edit modal
   ========================================================================== */

const inputCls = 'w-full px-3 py-1.5 bg-white border border-stone-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent';

const Label = ({ children }) => <div className="text-[11px] font-mono uppercase tracking-wider text-stone-500 mb-1.5">{children}</div>;

const Field = ({ label, children }) => (
  <div>
    <Label>{label}</Label>
    {children}
  </div>
);

const FormModal = ({ mode, initial, onClose, onSubmit }) => {
  const [form, setForm] = useState(initial || {
    type: 'Risk',
    title: '',
    area: AREAS[0].id,
    status: 'Identified',
    severity: 'Medium',
    owner: '',
    dueDate: dayStr(14),
    description: '',
    mitigation: '',
  });

  const updateForm = (k, v) => {
    const next = { ...form, [k]: v };
    if (k === 'type') next.status = TYPE_META[v].statuses[0];
    setForm(next);
  };

  const valid = form.title.trim();

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-stone-200 sticky top-0 bg-white">
          <h2 className="text-lg font-serif font-semibold text-stone-900">
            {mode === 'create' ? '신규 항목 생성' : '항목 편집'}
          </h2>
          <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded hover:bg-stone-100">
            <X className="w-4 h-4 text-stone-600" />
          </button>
        </div>

        <div className="p-6 space-y-4">
          <div>
            <Label>Type</Label>
            <div className="grid grid-cols-4 gap-2">
              {Object.keys(TYPE_META).map(t => {
                const meta = TYPE_META[t];
                const tone = TYPE_TONE[meta.tone];
                const Icon = meta.icon;
                const active = form.type === t;
                return (
                  <button
                    key={t}
                    type="button"
                    onClick={() => updateForm('type', t)}
                    className={cx('flex flex-col items-center gap-1 py-2.5 rounded-md border text-xs transition',
                      active ? cx(tone.bg, tone.text, 'border-transparent ring-2', tone.ring) : 'bg-white border-stone-200 text-stone-600 hover:border-stone-300')}
                  >
                    <Icon className="w-4 h-4" />
                    <span className="font-medium">{t}</span>
                    <span className="text-[10px] opacity-70">{meta.ko}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <Field label="Title *">
            <input type="text" value={form.title} onChange={(e) => updateForm('title', e.target.value)}
              placeholder="예: Azure OpenAI 쿼터 부족 가능성"
              className={inputCls} />
          </Field>

          <div className="grid grid-cols-2 gap-3">
            <Field label="영역">
              <select value={form.area} onChange={(e) => updateForm('area', e.target.value)} className={inputCls}>
                {AREAS.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
            </Field>
            <Field label="Owner">
              <input type="text" value={form.owner} onChange={(e) => updateForm('owner', e.target.value)}
                placeholder="담당자명"
                className={inputCls} />
            </Field>
            <Field label="Status">
              <select value={form.status} onChange={(e) => updateForm('status', e.target.value)} className={inputCls}>
                {TYPE_META[form.type].statuses.map(s => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Severity">
              <select value={form.severity} onChange={(e) => updateForm('severity', e.target.value)} className={inputCls}>
                {SEVERITIES.map(s => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Due Date">
              <input type="date" value={form.dueDate} onChange={(e) => updateForm('dueDate', e.target.value)} className={inputCls} />
            </Field>
          </div>

          <Field label="설명">
            <textarea rows={3} value={form.description} onChange={(e) => updateForm('description', e.target.value)}
              placeholder="무엇이 문제인지 / 왜 중요한지"
              className={cx(inputCls, 'resize-none')} />
          </Field>

          <Field label={form.type === 'Risk' ? 'Mitigation Plan' : form.type === 'Issue' ? 'Resolution' : 'Action / Validation'}>
            <textarea rows={2} value={form.mitigation} onChange={(e) => updateForm('mitigation', e.target.value)}
              placeholder="어떻게 대응할 것인지"
              className={cx(inputCls, 'resize-none')} />
          </Field>
        </div>

        <div className="border-t border-stone-200 px-6 py-3 flex items-center justify-end gap-2 bg-stone-50 sticky bottom-0">
          <button onClick={onClose} className="px-3 py-1.5 text-xs font-medium text-stone-700 hover:bg-stone-100 rounded-md transition">
            취소
          </button>
          <button
            disabled={!valid}
            onClick={() => onSubmit(form)}
            className="px-3 py-1.5 bg-stone-900 text-white text-xs font-medium rounded-md hover:bg-stone-800 disabled:bg-stone-200 disabled:text-stone-400 transition flex items-center gap-1.5"
          >
            <Check className="w-3.5 h-3.5" />
            {mode === 'create' ? '생성' : '저장'}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ==========================================================================
   Root
   ========================================================================== */

function RAIDApp() {
  const [view, setView] = useState('dashboard');
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncState, setSyncState] = useState(null);
  const saveTimer = useRef(null);
  const isFirstLoad = useRef(true);

  useEffect(() => {
    fetch(`${BIN_URL}/latest`, {
      headers: { 'X-Master-Key': API_KEY },
    })
      .then(r => r.json())
      .then(data => { setItems(data.record?.items?.length ? data.record.items : INITIAL_ITEMS); })
      .catch(() => { setItems(INITIAL_ITEMS); })
      .finally(() => { setLoading(false); });
  }, []);

  useEffect(() => {
    if (isFirstLoad.current) { isFirstLoad.current = false; return; }
    setSyncState('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch(BIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify({ items }),
      })
        .then(() => { setSyncState('saved'); setTimeout(() => setSyncState(null), 2000); })
        .catch(() => { setSyncState('error'); });
    }, 800);
  }, [items]);
  const [filters, setFilters] = useState({ area: 'all', type: 'all', status: 'all', severity: 'all', search: '' });
  const [selectedItem, setSelectedItem] = useState(null);
  const [modalMode, setModalMode] = useState(null);

  const TYPE_ORDER = { Issue: 0, Risk: 1, Assumption: 2, Dependency: 3 };
  const filtered = useMemo(() => items.filter(i => {
    if (filters.area !== 'all' && i.area !== filters.area) return false;
    if (filters.type !== 'all' && i.type !== filters.type) return false;
    if (filters.status !== 'all' && i.status !== filters.status) return false;
    if (filters.severity !== 'all' && i.severity !== filters.severity) return false;
    if (filters.search && !i.title.toLowerCase().includes(filters.search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => TYPE_ORDER[a.type] - TYPE_ORDER[b.type]), [items, filters]);

  const createItem = (data) => {
    const prefix = data.type[0];
    const n = items.filter(i => i.type === data.type).length + 1;
    const newItem = { ...data, id: `${prefix}-${String(n).padStart(2, '0')}`, createdAt: dayStr(0), comments: [] };
    setItems([newItem, ...items]);
  };
  const updateItem = (id, updates) => setItems(items.map(i => i.id === id ? { ...i, ...updates } : i));
  const deleteItem = (id) => setItems(items.filter(i => i.id !== id));
  const transitionStatus = (id, status) => updateItem(id, { status });
  const addComment = (id, text) => {
    const item = items.find(i => i.id === id);
    updateItem(id, { comments: [...(item.comments || []), { author: '나', date: dayStr(0), text }] });
  };

  const currentItem = selectedItem ? items.find(i => i.id === selectedItem.id) : null;

  return (
    <div className="min-h-screen bg-stone-50 text-stone-900">
      <Header
        view={view} setView={setView}
        onCreate={() => setModalMode('create')}
        onReset={() => { if (confirm('모든 데이터를 초기 상태로 되돌립니다. 계속하시겠습니까?')) setItems(INITIAL_ITEMS); }}
        syncState={syncState}
      />
      {loading && (
        <div className="flex items-center justify-center min-h-[60vh]">
          <div className="text-sm text-stone-500 font-mono">데이터 불러오는 중…</div>
        </div>
      )}
      {!loading && (<>
        {view === 'dashboard' ? (
          <Dashboard items={items} setView={setView} setFilters={setFilters} />
        ) : (
          <RAIDLog
            items={filtered}
            filters={filters}
            setFilters={setFilters}
            onRowClick={(i) => { setSelectedItem(i); setModalMode('detail'); }}
            onTransition={transitionStatus}
            onEdit={(i) => { setSelectedItem(i); setModalMode('edit'); }}
            onDelete={deleteItem}
          />
        )}

        {modalMode === 'create' && (
          <FormModal mode="create" onClose={() => setModalMode(null)}
            onSubmit={(data) => { createItem(data); setModalMode(null); }} />
        )}
        {modalMode === 'edit' && currentItem && (
          <FormModal mode="edit" initial={currentItem}
            onClose={() => { setModalMode(null); setSelectedItem(null); }}
            onSubmit={(data) => { updateItem(currentItem.id, data); setModalMode(null); setSelectedItem(null); }} />
        )}
        {modalMode === 'detail' && currentItem && (
          <DetailDrawer
            item={currentItem}
            onClose={() => { setModalMode(null); setSelectedItem(null); }}
            onTransition={transitionStatus}
            onAddComment={addComment}
            onEdit={() => setModalMode('edit')}
            onDelete={() => { deleteItem(currentItem.id); setModalMode(null); setSelectedItem(null); }}
          />
        )}
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RAIDApp />);
  </script>
</body>
</html>
