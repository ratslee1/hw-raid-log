<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — RAID Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .font-serif { font-family: 'Source Serif Pro', Georgia, serif; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="bg-white border border-stone-200 rounded-2xl shadow-sm p-8">
      <div class="text-center mb-8">
        <h1 class="font-serif text-3xl font-bold text-stone-900">RAID Log</h1>
        <p class="text-sm text-stone-500 mt-2">승인된 계정 전용</p>
      </div>

      <button id="loginBtn"
        class="w-full flex items-center justify-center gap-3 bg-stone-900 hover:bg-stone-800 text-white font-medium py-3 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
        <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        <span id="loginBtnText">Microsoft 계정으로 로그인</span>
      </button>

      <div id="errorBox" class="hidden mt-4 p-3 bg-rose-50 border border-rose-200 rounded-lg">
        <p class="text-sm text-rose-700" id="errorMsg"></p>
      </div>

      <div id="loadingBox" class="hidden mt-4 text-center">
        <p class="text-sm text-stone-500">인증 처리 중...</p>
      </div>
    </div>

    <p class="text-xs text-stone-400 text-center mt-6">
      승인된 계정만 접근 가능합니다.
    </p>
  </div>

  <script>
    // ============================================================
    //  Azure AD 설정 — Azure Portal > App Registrations 에서 발급
    //  TODO: clientId 와 (선택) tenantId 를 실제 값으로 교체
    //   - Redirect URI 는 이 페이지의 정확한 URL 로 등록 (예: https://your-host/login.html)
    //   - Platform: Single-page application (SPA)
    // ============================================================
    const AZURE_CONFIG = {
      clientId: '592da474-ca81-42a7-9c2c-aeaf2934a4a9',
      // kt.com 전용 테넌트가 있으면 그 tenantId 로 교체. 모르면 'organizations' 유지.
      authority: 'https://login.microsoftonline.com/28fad9d9-3a2c-4a2f-b76f-8da5d0da9756',
      redirectUri: window.location.origin + window.location.pathname,
    };

    const ALLOWED_EMAIL = 'sangheun.lee@kt.com';
    const SESSION_KEY = 'raid_auth';

    const msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: AZURE_CONFIG.clientId,
        authority: AZURE_CONFIG.authority,
        redirectUri: AZURE_CONFIG.redirectUri,
      },
      cache: { cacheLocation: 'localStorage' },
    });

    const $btn = document.getElementById('loginBtn');
    const $btnText = document.getElementById('loginBtnText');
    const $err = document.getElementById('errorBox');
    const $errMsg = document.getElementById('errorMsg');
    const $loading = document.getElementById('loadingBox');

    function showError(msg) {
      $errMsg.textContent = msg;
      $err.classList.remove('hidden');
      $loading.classList.add('hidden');
      $btn.disabled = false;
      $btnText.textContent = 'Microsoft 계정으로 로그인';
    }

    function getEmail(account) {
      return (
        account?.username ||
        account?.idTokenClaims?.preferred_username ||
        account?.idTokenClaims?.email ||
        ''
      ).toLowerCase();
    }

    async function handleSuccess(account) {
      const email = getEmail(account);
      if (email !== ALLOWED_EMAIL) {
        await msalInstance.logoutRedirect({
          account,
          postLogoutRedirectUri: AZURE_CONFIG.redirectUri,
          onRedirectNavigate: () => false,
        }).catch(() => {});
        msalInstance.clearCache();
        showError(`접근 권한이 없습니다. (현재: ${email || '알 수 없음'})`);
        return;
      }

      localStorage.setItem(SESSION_KEY, JSON.stringify({
        email,
        name: account.name || email,
        loginAt: Date.now(),
      }));

      window.location.replace('index.html');
    }

    msalInstance.initialize().then(async () => {
      try {
        const result = await msalInstance.handleRedirectPromise();
        if (result?.account) {
          await handleSuccess(result.account);
          return;
        }
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          await handleSuccess(accounts[0]);
          return;
        }
      } catch (e) {
        console.error(e);
        showError('로그인 처리 중 오류: ' + (e.message || e));
      }
    });

    $btn.addEventListener('click', async () => {
      $err.classList.add('hidden');
      $btn.disabled = true;
      $btnText.textContent = '리다이렉트 중...';
      try {
        await msalInstance.loginRedirect({
          scopes: ['User.Read', 'openid', 'profile', 'email'],
          prompt: 'select_account',
        });
      } catch (e) {
        showError('로그인 시작 실패: ' + (e.message || e));
      }
    });
  </script>
</body>
</html>
